<!-- Hero placeholder: split layout with left content and right InteractiveOrb -->
<section
  style="
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    padding: 96px 24px;
    align-items: center;
    background: var(--bg);
  "
>
  <div>
    <div
      style="
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
        color: var(--accent);
      "
    >
      <span
        style="
          width: 48px;
          height: 4px;
          background: var(--accent);
          display: inline-block;
        "
      ></span
      ><strong>Available for Hire</strong>
    </div>
    <h1 class="h-hero">Bold, modern portfolio with vivid accents</h1>
    <p
      class="body-text"
      style="font-size: 18px; margin-top: 18px; max-width: 640px"
    >
      I design and build high-contrast, interactive experiences blending motion
      and thoughtful typography.
    </p>
    <div style="margin-top: 24px; display: flex; gap: 12px">
      <button
        style="
          background: var(--accent);
          color: var(--bg);
          padding: 12px 20px;
          border-radius: 999px;
          border: none;
        "
      >
        Hire Me
      </button>
      <button
        style="
          background: transparent;
          border: 1px solid rgba(255, 255, 255, 0.09);
          color: var(--text-primary);
          padding: 12px 20px;
          border-radius: 999px;
        "
      >
        See Work
      </button>
    </div>
  </div>
  <div class="orb-container">
    <!-- InteractiveOrb placeholder -->
    <div
      style="
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          rgba(232, 85, 58, 0.12),
          rgba(212, 165, 116, 0.08)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      "
    >
      <div
        style="
          width: 88px;
          height: 88px;
          border-radius: 50%;
          background: linear-gradient(135deg, var(--accent), var(--warm));
        "
      ></div>
    </div>
  </div>
</section>
