<!-- Contact Section placeholder -->
<section style="padding: 96px 24px; text-align: center; background: var(--bg)">
  <h2
    style="
      font-family: &quot;Clash Grotesk&quot;;
      font-size: 60px;
      color: var(--text-primary);
    "
  >
    Let's Connect
  </h2>
  <div
    style="
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 900px;
      margin: 36px auto 0;
    "
  >
    <div style="background: var(--surface); padding: 24px; border-radius: 12px">
      <div
        style="
          width: 48px;
          height: 48px;
          margin: 0 auto 12px;
          background: var(--surface);
          border-radius: 12px;
          border: 1px solid rgba(255, 255, 255, 0.1);
        "
      ></div>
      <h4 style="color: var(--text-primary)">Email</h4>
      <p class="body-text">hello@swapnil.dev</p>
    </div>
    <div style="background: var(--surface); padding: 24px; border-radius: 12px">
      <div
        style="
          width: 48px;
          height: 48px;
          margin: 0 auto 12px;
          background: var(--surface);
          border-radius: 12px;
          border: 1px solid rgba(255, 255, 255, 0.1);
        "
      ></div>
      <h4 style="color: var(--text-primary)">LinkedIn</h4>
      <p class="body-text">/in/swapnil</p>
    </div>
    <div style="background: var(--surface); padding: 24px; border-radius: 12px">
      <div
        style="
          width: 48px;
          height: 48px;
          margin: 0 auto 12px;
          background: var(--surface);
          border-radius: 12px;
          border: 1px solid rgba(255, 255, 255, 0.1);
        "
      ></div>
      <h4 style="color: var(--text-primary)">Twitter</h4>
      <p class="body-text">@swapnil</p>
    </div>
  </div>
</section>
